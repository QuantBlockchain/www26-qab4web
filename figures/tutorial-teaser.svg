<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">WWW 2026 Tutorial Teaser Figure</title>
  <desc id="desc">Collaborative tutorial map showing Quantum, AI, and Blockchain as connected pillars for the Web through efficiency, shared standards, and interoperability.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070f22"/>
      <stop offset="52%" stop-color="#13335a"/>
      <stop offset="100%" stop-color="#0e5c61"/>
    </linearGradient>
    <radialGradient id="halo1" cx="0.2" cy="0.08" r="0.7">
      <stop offset="0%" stop-color="#65d3ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#65d3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.9" cy="0.9" r="0.65">
      <stop offset="0%" stop-color="#9af6cb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9af6cb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80e6ff"/>
      <stop offset="100%" stop-color="#a5ffd6"/>
    </linearGradient>
    <radialGradient id="webSphere" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f2fdff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#bdefff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#87d7ff" stop-opacity="0.18"/>
    </radialGradient>
    <linearGradient id="webRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#bdeeff" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#d6f8ff"/>
    </marker>
